<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sepet | Asya Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f4f7ff; --surface:#fff; --primary:#1d4b94; --accent:#4d8cff; --text:#102043; --muted:#617397; --border:rgba(29,75,148,.12); --shadow:0 16px 36px rgba(29,75,148,.12); --radius:24px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; font-family:'Inter',Arial,sans-serif; color:var(--text); background:linear-gradient(180deg,#f9fbff,#eef4ff); line-height:1.6; }
    a { color:inherit; text-decoration:none; }
    .container { width:min(1100px, calc(100% - 1rem)); margin:0 auto; }
    .main-header { position:sticky; top:0; background:rgba(255,255,255,.8); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .header-inner { min-height:78px; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .brand { font-weight:800; color:var(--primary); }
    .top-link { display:inline-flex; align-items:center; justify-content:center; min-height:44px; padding:.8rem 1rem; border-radius:999px; background:#fff; border:1px solid var(--border); font-weight:700; color:var(--primary); }
    .cart-page { padding:2rem 0 3rem; }
    .section-head { margin-bottom:1.25rem; }
    .section-head h1 { font-size:clamp(2rem,4vw,3rem); line-height:1.05; margin-bottom:.4rem; }
    .section-head p { color:var(--muted); }
    .cart-layout { display:grid; grid-template-columns:1.2fr .8fr; gap:1rem; }
    .cart-item, .cart-summary { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
    .cart-item { display:grid; grid-template-columns:120px 1fr auto; gap:1rem; align-items:center; padding:1rem; margin-bottom:1rem; }
    .thumb { width:120px; height:96px; border-radius:20px; background:linear-gradient(180deg,#eef4ff,#ffffff); display:grid; place-items:center; color:var(--primary); }
    .item-meta p { color:var(--muted); }
    .item-price { font-size:1.2rem; font-weight:800; color:var(--primary); margin-top:.35rem; }
    .item-controls { display:grid; gap:.75rem; }
    .qty { display:inline-flex; align-items:center; border:1px solid var(--border); border-radius:999px; overflow:hidden; }
    .qty button { width:44px; height:44px; border:none; background:#eef4ff; color:var(--primary); font-size:1.2rem; font-weight:800; cursor:pointer; }
    .qty span { width:54px; text-align:center; font-weight:700; }
    .btn-danger, .checkout-btn { min-height:46px; padding:.85rem 1rem; border-radius:999px; font-weight:800; border:none; cursor:pointer; }
    .btn-danger { background:#fff3f3; color:#c62828; border:1px solid rgba(198,40,40,.14); }
    .cart-summary { padding:1.25rem; height:fit-content; position:sticky; top:96px; }
    .cart-summary h2 { margin-bottom:.8rem; }
    .summary-row, .summary-total { display:flex; justify-content:space-between; gap:1rem; padding:.9rem 0; }
    .summary-row { border-bottom:1px solid var(--border); color:var(--muted); }
    .summary-total { font-size:1.1rem; font-weight:800; }
    .checkout-btn { width:100%; color:#fff; background:linear-gradient(135deg,var(--primary),var(--accent)); margin-top:.9rem; }
    @media (max-width: 860px) { .cart-layout, .cart-item { grid-template-columns:1fr; } .cart-summary { position:static; } }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="container header-inner">
      <a class="brand" href="../../">Asya Market</a>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
        <a class="top-link" href="https://www.it-solutions-cakir.be/nl/" target="_blank" rel="noopener noreferrer">IT Solutions</a>
        <a class="top-link" href="../../">Ana Sayfa</a>
      </div>
    </div>
  </header>
  <main class="cart-page">
    <div class="container">
      <div class="section-head">
        <h1>Sepetim</h1>
        <p>Eklenen ürünleri miktar kontrolleriyle yönetebilirsiniz.</p>
      </div>
      <div class="cart-layout">
        <section>
          <article class="cart-item">
            <div class="thumb"><svg viewBox="0 0 64 64" width="52" height="52" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 42C14 31.5066 22.5066 23 33 23H37C43.6274 23 49 28.3726 49 35V39C49 44.5228 44.5228 49 39 49H21C17.134 49 14 45.866 14 42Z" fill="currentColor" opacity="0.18"/><path d="M22 31H44" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg></div>
            <div class="item-meta"><strong>Asya Dana Kıyma</strong><p>Et Ürünleri · kg</p><div class="item-price">€12.50</div></div>
            <div class="item-controls"><div class="qty"><button type="button">-</button><span>1</span><button type="button">+</button></div><button class="btn-danger" type="button">Sil</button></div>
          </article>
          <article class="cart-item">
            <div class="thumb"><svg viewBox="0 0 64 64" width="52" height="52" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 17H46V47H18V17Z" fill="currentColor" opacity="0.18"/><path d="M18 19C18 15.6863 20.6863 13 24 13H40C43.3137 13 46 15.6863 46 19V45C46 48.3137 43.3137 51 40 51H24C20.6863 51 18 48.3137 18 45V19Z" stroke="currentColor" stroke-width="4"/></svg></div>
            <div class="item-meta"><strong>Asya Beyaz Peynir</strong><p>Süt Ürünleri · paket</p><div class="item-price">€8.99</div></div>
            <div class="item-controls"><div class="qty"><button type="button">-</button><span>1</span><button type="button">+</button></div><button class="btn-danger" type="button">Sil</button></div>
          </article>
        </section>
        <aside class="cart-summary">
          <h2>Sipariş Özeti</h2>
          <div class="summary-row"><span>Ara Toplam</span><span>€21.49</span></div>
          <div class="summary-row"><span>KDV</span><span>€1.29</span></div>
          <div class="summary-total"><span>Toplam</span><span>€22.78</span></div>
          <button class="checkout-btn" type="button">Siparişi Tamamla</button>
        </aside>
      </div>
    </div>
  </main>
</body>
</html>
