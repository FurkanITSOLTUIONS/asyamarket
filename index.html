<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asya Market | Premium Alışveriş</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <a href="./" class="logo-link">
            <h1 class="brand-logo-text">ASYA <span>MARKET</span></h1>
        </a>
        
        <button class="hamburger-btn" id="hamburger-btn">
            <span></span><span></span><span></span>
        </button>

        <nav class="main-nav">
            <a href="./" class="active">Ana Sayfa</a>
            <a href="#urunler">Ürünler</a>
            <a href="#iletisim">İletişim</a>
        </nav>

        <section class="header-actions">
            <nav class="lang-selector">
                <a href="./" class="active-lang">TR</a>
                <a href="nl/">NL</a>
                <a href="en/">EN</a>
                <a href="fr/">FR</a>
                <a href="ar/">AR</a>
            </nav>
            <a href="cart/tr/" class="cart-button">
                Sepet <span id="cart-badge">0</span>
            </a>
        </section>
    </header>

    <main>
        <section class="hero-banner">
            <div class="hero-content">
                <h1>Asya'nın Tazeliği, Zele'nin Merkezinde</h1>
                <p>En kaliteli ürünler, en uygun fiyatlarla Asya Market'te.</p>
            </div>
        </section>

        <section class="admin-panel">
            <div class="admin-container">
                <h2>Ürün Yönetimi (Admin Paneli)</h2>
                <form id="add-product-form" class="admin-form">
                    <input type="text" id="prod-name" placeholder="Ürün Adı (Örn: Helal Sosis)" required>
                    <input type="number" id="prod-price" placeholder="Fiyat (€)" step="0.01" required>
                    <input type="url" id="prod-img" placeholder="Resim Linki (https://...)" required>
                    <button type="submit" class="btn-admin">Ürünü Ekle</button>
                </form>
            </div>
        </section>

        <section id="urunler" class="products-section">
            <header class="section-header">
                <h2>Güncel Ürünlerimiz</h2>
            </header>
            <article class="product-grid" id="product-grid">
            </article>
        </section>
    </main>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
